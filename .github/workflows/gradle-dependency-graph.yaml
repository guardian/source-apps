name: Update Dependency Graph for Gradle
on:
  push:
    branches:
      - main
  workflow_dispatch: 
jobs:
  dependency-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Submit dependencies
        id: submit
        uses: gradle/actions/dependency-submission@b128da9bf0c2651a9fe51856df98ba6e611afc58 # v4.1.0
        with:
          build-root-directory: android

      - name: Log snapshot for user validation
        id: validate
        run: cat
          /home/runner/work/source-apps/source-apps/dependency-graph-reports/update_dependency_graph_for_gradle-dependency-graph.json
          | jq

    permissions:
      contents: write